body:
  text: 隋天竺三藏闍那崛多共笈多譯隨喜功德品第十七爾時彌勒菩薩摩訶薩白佛言世尊若有善男子善女人聞是法華經隨喜者得幾所福而説偈言世尊滅度後其有聞是經若能隨喜者為得幾所福爾時佛告彌勒菩薩摩訶薩阿逸多如來滅後若比丘比丘尼優婆塞優婆夷及餘智者若長若幼聞是經隨喜已從法會出至於餘處若在僧坊若空間地若城邑巷陌聚落田里如其所聞為父母宗親善友知識隨力演説是諸人等聞已隨喜復行轉教餘人聞已亦隨喜轉教如是展轉至第五十阿逸多其第五十善男子善女人隨喜功德我今説之汝當善聽若四百萬億阿僧祇世界六趣四生衆生卵生胎生濕生化生若有形無形有想無想非有想非無想無足二足四足多足如是等在衆生數者有人求福隨其所欲娛樂之具皆給與之一一衆生與滿閻浮提金銀琉璃車璩馬瑙珊瑚虎珀諸妙珍寶及象馬車乘七寶所成宮殿樓閣等是大施主如是布施滿八十年已而作是念我已施衆生娛樂之具隨意所欲然此衆生皆已衰老年過八十髮白面皺將死不久我當以佛法而訓導之即集此衆生宣布法化示教利喜一時皆得須陀洹道斯陀含道阿那含道阿羅漢道盡諸有漏於深禪定皆得自在具八解脫於汝意云何是大施主所得功德寧為多不彌勒白佛言世尊是人功德甚多無量無邊若是施主但施衆生一切樂具功德無量何況令得阿羅漢果佛告彌勒我今分明語汝是人以一切樂具施於四百萬億阿僧祇世界六趣衆生又令得阿羅漢果所得功德不如是第五十人聞法華經一偈隨喜功德百分千分百千萬億分不及其一乃至算數譬喻所不能知阿逸多如是第五十人展轉聞法華經隨喜功德尚無量無邊阿僧祇何況最初於會中聞而隨喜者其福復勝無量無邊阿僧祇不可得比又阿逸多若人為是經故往詣僧坊若坐若立須臾聽受緣是功德轉身所生得好上妙象馬車乘珍寶輦輿及乘天宮若復有人於講法處坐更有人來勸令坐聽若分座令坐是人功德轉身得帝釋坐處若梵王坐處若轉輪聖王所坐之處阿逸多若復有人語餘人言有經名法華可共往聽即受其教乃至須臾間聞是人功德轉身得與陀羅尼菩薩共生一處利根智慧百千萬世終不瘖啞口氣不臭舌常無病口亦無病齒不垢黑不黃不踈亦不缺落不差不曲唇不下垂亦不褰縮不麁澀不瘡疹亦不缺壞亦不喎斜不厚不大亦不黧黑無諸可惡鼻不䐔胅亦不曲戾面色不黑亦不狹長亦不窊曲無有一切不可喜相唇舌牙齒悉皆嚴好鼻修高直面貌圓滿眉高而長額廣平正人相具足世世所生見佛聞法信受教誨阿逸多汝且觀是勸於一人令往聽法功德如此何況一心聽説讀誦而於大衆為人分別如説修行爾時世尊欲重宣此義而説偈言若人於法會得聞是經典乃至於一偈隨喜為他説如是展轉教至于第五十最後人獲福今當分別之如有大施主供給無量衆具滿八十歲隨意之所欲見彼衰老相髮白而面皺齒踈形枯竭念其死不久我今應當教令得於道果即為方便説涅槃真實法世皆不牢固如水沫泡焰汝等咸應當疾生厭離心諸人聞是法皆得阿羅漢具足六神通三明八解脫最後第五十聞一偈隨喜是人福勝彼不可為譬喻如是展轉聞其福尚無量何況於法會初聞隨喜者若有勸一人將引聽法華言此經深妙千萬劫難遇即受教往聽乃至須臾聞斯人之福報今當分別説世世無口患齒不踈黃黑唇不厚褰缺無有可惡相舌不乾黑短鼻高修且直額廣而平正面目悉端嚴為人所喜見口氣無臭穢優鉢華之香常從其口出若故詣僧坊欲聽法華經須臾聞歡喜今當説其福後生天人中得妙象馬車珍寶之輦輿及乘天宮殿若於講法處勸人坐聽經是福因緣得釋梵轉輪座何況一心聽解説其義趣如説而修行其福不可限添品妙法蓮華經法師功德品第十八爾時佛告常精進菩薩摩訶薩若善男子善女人受持是法華經若讀若誦若解説若書寫是人當得八百眼功德千二百耳功德八百鼻功德千二百舌功德八百身功德千二百意功德以是功德莊嚴六根皆令清淨是善男子善女人父母所生清淨肉眼見於三千大千世界內外所有山林河海下至阿鼻地獄上至有頂亦見其中一切衆生及業因緣果報生處悉見悉知爾時世尊欲重宣此義而説偈言若於大衆中以無所畏心説是法華經汝聽其功德是人得八百功德殊勝眼以是莊嚴故其目甚清淨父母所生眼悉見三千界內外彌樓山須彌及鐵圍并諸餘山林大海江河水下至阿鼻獄上至有頂處其中諸衆生一切皆悉見雖未得天眼肉眼力如是復次常精進若善男子善女人受持此經若讀若誦若解説若書寫得千二百耳功德以是清淨耳聞三千大千世界下至阿鼻地獄上至有頂其中內外種種所有語言音聲象聲馬聲牛聲車聲啼哭聲愁歎聲螺聲鼓聲鐘聲鈴聲笑聲語聲男聲女聲童子聲童女聲法聲非法聲苦聲樂聲凡夫聲聖人聲喜聲不喜聲天聲龍聲夜叉聲乾闥婆聲阿修羅聲迦樓羅聲緊那羅聲摩睺羅伽聲火聲水聲風聲地獄聲畜生聲餓鬼聲比丘聲比丘尼聲聲聞聲辟支佛聲菩薩聲佛聲以要言之三千大千世界中一切內外所有諸聲雖未得天耳以父母所生清淨常耳皆悉聞知如是分別種種音聲而不壞耳根爾時世尊欲重宣此義而説偈言父母所生耳清淨無濁穢以此常耳聞三千世界聲象馬車牛聲鍾鈴螺鼓聲琴瑟箜篌聲簫笛之音聲清淨好歌聲聽之而不著無數種人聲聞悉能解了又聞諸天聲微妙之歌音及聞男女聲童子童女聲山川險谷中迦陵頻伽聲命命等諸鳥悉聞其音聲地獄衆苦痛種種楚毒聲餓鬼飢渴逼求索飲食聲諸阿修羅等居在大海邊自共言語時出於大音聲如是説法者安住於此間遙聞是衆聲而不壞耳根十方世界中禽獸鳴相呼其説法之人於此悉聞之其諸梵天上光音及遍淨乃至有頂天言語之音聲法師住於此悉皆得聞之一切比丘衆及諸比丘尼若讀誦經典若為他人説法師住於此悉皆得聞之復有諸菩薩讀誦於經法若為他人説撰集解其義如是諸音聲悉皆得聞之諸佛大聖尊教化衆生者於諸大會中演説微妙法持此法華者悉皆得聞之三千大千界內外諸音聲下至阿鼻獄上至有頂天皆聞其音聲而不壞耳根其耳聰利故悉能分別知持是法華者雖未得天耳但用所生耳功德已如是復次常精進若善男子善女人受持是經若讀若誦若解説若書寫成就八百鼻功德以是清淨鼻根聞於三千大千世界上下內外種種諸香須曼那華香闍提華香末利華香瞻蔔華香波羅羅華香赤蓮華香青蓮華香白蓮華香華樹香果樹香栴檀香沈水香多摩羅跋香多伽羅香及千萬種和香若末若丸若塗香持是經者於此間住悉能分別又復別知衆生之香象香馬香牛羊等香男香女香童子香童女香及草木叢林香若近若遠所有諸香悉皆得聞分別不錯持是經者雖住於此亦聞天上諸天之香波利質多羅拘鞞陀羅樹香及曼陀羅華香摩訶曼陀羅華香曼殊沙華香摩訶曼殊沙華香栴檀沈水種種末香諸雜華香如是等天香和合所出之香無不聞知又聞諸天身香釋提桓因在勝殿上五欲娛樂嬉戲時香若在妙法堂上為忉利諸天説法時香若於諸園遊戲時香及餘天等男女身香皆悉遙聞如是展轉乃至梵天上至有頂諸天身香亦皆聞之并聞諸天所燒之香及聲聞香辟支佛香菩薩香諸佛身香亦皆遙聞知其所在雖聞此香然於鼻根不壞不錯若欲分別為他人説憶念不謬爾時世尊欲重宣此義而説偈言是人鼻清淨於此世界中若香若臭物種種悉聞知須曼那闍提多摩羅栴檀沈水及桂香種種華果香及知衆生香男子女人香説法者遠住聞香知所在大勢轉輪王小轉輪及子群臣諸宮人聞香知所在身所著珍寶及地中寶藏轉輪王寶女聞香知所在諸人嚴身具衣服及瓔珞種種所塗香聞則知其身諸天若行坐遊戲及神變持是法華者聞香悉能知諸樹華果實及穌油香氣持經者住此悉知其所在諸山深險處栴檀樹華敷衆生在中者聞香悉能知鐵圍山大海地中諸衆生持經者聞香悉知其所在阿修羅男女及其諸眷屬鬪諍遊戲時聞香皆能知曠野險隘處師子象虎狼野牛水牛等聞香知所在若有懷妊者未辨其男女無根及非人聞香悉能知以聞香力故知其初懷妊成就不成就安樂産福子以聞香力故知男女所念染欲癡恚心亦知修善者地中衆伏藏金銀諸珍寶銅器之所盛聞香悉能知種種諸瓔珞無能識其價聞香知貴賤出處及所在天上諸華等曼陀曼殊沙波利質多樹聞香悉能知天上諸宮殿上中下差別衆寶華莊嚴聞香悉能知天園林勝殿諸觀妙法堂在中而娛樂聞香悉能知諸天若聽法或受五欲時來往行坐臥聞香悉能知天女所著衣好華香莊嚴周旋遊戲時聞香悉能知如是展轉上乃至於梵天入禪出禪者聞香悉能知光音遍淨天乃至於有頂初生及退沒聞香悉能知諸比丘衆等於法常精進若坐若經行及讀誦經法或在林樹下專精而坐禪持經者聞香悉知其所在菩薩志堅固坐禪若讀經或為人説法聞香悉能知在在方世尊一切所恭敬愍衆而説法聞香悉能知衆生在佛前聞經皆歡喜如法而修行聞香悉能知雖未得菩薩無漏法生鼻而是持經者先得此鼻相復次常精進若善男子善女人受持是經若讀若誦若解説若書寫得千二百舌功德若好若醜若美不美及諸苦澀物在其舌根皆變成上味如天甘露無不美者若以舌根於大衆中有所演説出深妙聲能入其心皆令歡喜快樂又諸天子天女釋梵諸天聞是深妙音聲有所演説言論次第皆悉來聽及諸龍龍女夜叉夜叉女乾闥婆乾闥婆女阿修羅阿修羅女迦樓羅迦樓羅女緊那羅緊那羅女摩睺羅伽摩睺羅伽女為聽法故皆來親近恭敬供養及比丘比丘尼優婆塞優婆夷國王王子群臣眷屬小轉輪王大轉輪王七寶千子內外眷屬乘其宮殿俱來聽法以是菩薩善説法故婆羅門居士國內人民盡其形壽隨侍供養又諸聲聞辟支佛菩薩諸佛常樂見之是人所在方面諸佛皆向其處説法悉能受持一切佛法又能出於深妙法音爾時世尊欲重宣此義而説偈言是人舌根淨終不受惡味其有所食噉悉皆成甘露以深淨妙聲於大衆説法以諸因緣喻引導衆生心聞者皆歡喜設諸上供養諸天龍夜叉及阿修羅等皆以恭敬心而共來聽法是説法之人若欲以妙音遍滿三千界隨意即能至大小轉輪王及千子眷屬合掌恭敬心常來聽受法諸天龍夜叉羅剎毗舍闍亦以歡喜心常樂來供養梵天王魔王自在大自在如是諸天衆常來至其所諸佛及弟子聞其説法音常念而守護或時為現身復次常精進若善男子善女人受持是經若讀若誦若解説若書寫得八百身功德得清淨身如淨琉璃衆生喜見其身淨故三千大千世界衆生生時死時上下好醜生善處惡處悉於中現及鐵圍山大鐵圍山彌樓山摩訶彌樓山等諸山及其中衆生悉於中現下至阿鼻地獄上至有頂所有及衆生悉於中現若聲聞辟支佛菩薩諸佛説法皆於身中現其色像爾時世尊欲重宣此義而説偈言若持法華者其身甚清淨如彼淨琉璃衆生皆喜見又如淨明鏡悉見諸色像菩薩於淨身皆見世所有唯獨自明了餘人所不見三千世界中一切諸群萌天人阿修羅地獄鬼畜生如是諸色像皆於身中現諸天等宮殿乃至於有頂鐵圍及彌樓摩訶彌樓山諸大海水等皆於身中現諸佛及聲聞佛子菩薩等若獨若在衆説法悉皆現雖未得無漏法性之妙身以清淨常體一切於中現復次常精進若善男子善女人如來滅後受持是經若讀若誦若解説若書寫得千二百意功德以是清淨意根乃至聞一偈一句通達無量無邊之義解是義已能演説一句一偈至於一月四月乃至一歲諸所説法隨其義趣皆與實相不相違背若説俗間經書治世語言資生業等皆順正法三千大千世界六趣衆生心之所行心所動作心所戲論皆悉知之雖未得無漏智慧而其意根清淨如此是人有所思惟籌量言説皆是佛法無不真實亦是先佛經中所説爾時世尊欲重宣此義而説偈言是人意清淨明利無穢濁以此妙意根知上中下法乃至聞一偈通達無量義次第如法説月四月至歲是世界內外一切諸衆生若天龍及人夜叉鬼神等其在六趣中所念若干種持法華之報一時皆悉知十方無數佛百福莊嚴相為衆生説法悉聞能受持思惟無量義説法亦無量終始不忘錯以持法華故悉知諸法相隨義識次第達名字語言如所知演説此人有所説皆是先佛法以演此法故於衆無所畏持法華經者意根淨若斯雖未得無漏先有如是相是人持此經安住希有地為一切衆生歡喜而愛敬能以千萬種善巧之語言分別而説法持法華經故添品妙法蓮華經常不輕菩薩品第十九爾時佛告得大勢菩薩摩訶薩汝今當知若比丘比丘尼優婆塞優婆夷持法華經者若有惡口罵詈誹謗獲大罪報如前所説其所得功德如向所説眼耳鼻舌身意清淨得大勢乃往古昔過無量無邊不可思議阿僧祇劫有佛名威音王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊劫名離衰國名大成其威音王佛於彼世中為天人阿修羅説法為求聲聞者説應四諦法度生老病死究竟涅槃為求辟支佛者説應十二因緣法為諸菩薩因阿耨多羅三藐三菩提説應六波羅蜜法究竟佛慧得大勢是威音王佛壽四十萬億那由他恆河沙劫正法住世劫數如一閻浮提微塵像法住世劫數如四天下微塵其佛饒益衆生已然後滅度正法像法滅盡之後於此國土復有佛出亦號威音王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如是次第有二萬億佛皆同一號最初威音王如來既已滅度正法滅後於像法中增上慢比丘有大勢力爾時有一菩薩比丘名常不輕得大勢以何因緣名常不輕是比丘凡有所見若比丘比丘尼優婆塞優婆夷皆悉禮拜讚歎而作是言我深敬汝等不敢輕慢所以者何汝等皆行菩薩道當得作佛而是比丘不專讀誦經典但行禮拜乃至遠見四衆亦復故往禮拜讚歎而作是言我不敢輕於汝等汝等皆當作佛四衆之中有生瞋恚心不淨者惡口罵詈言是無智比丘從何所來自言我不輕汝而與我等授記當得作佛我等不用如是虛妄授記如此經歷多年常被罵詈不生瞋恚常作是言汝當作佛説是語時衆人或以杖木瓦石而打擲之避走遠住猶高聲唱言我不敢輕汝汝等皆當作佛以其常作是語故增上慢比丘比丘尼優婆塞優婆夷號之為常不輕是比丘臨欲終時於虛空中具聞威音王佛先所説法華經二十千萬億偈悉能受持即得如上眼根清淨耳鼻舌身意根清淨得是六根清淨已更增壽命二百萬億那由他歲廣為人説是法華經於時增上慢四衆比丘比丘尼優婆塞優婆夷輕賤是人為作不輕名者見其得大神通力樂説辨力大善寂力聞其所説皆信伏隨從是菩薩復化千萬億衆令住阿耨多羅三藐三菩提命終之後得值二千億佛皆號日月燈明於其法中説是法華經以是因緣復值二千億佛皆同號雲自在燈王於此諸佛法中受持讀誦為諸四衆説此經典故得是常眼清淨耳鼻舌身意諸根清淨於四衆中説法心無所畏得大勢是常不輕菩薩摩訶薩供養如是若干諸佛恭敬尊重讚歎種諸善根於後復值千萬億佛亦於諸佛法中説是經典功德成就當得作佛得大勢於意云何爾時常不輕菩薩豈異人乎則我身是若我於宿世不受持讀誦此經為他人説者不能疾得阿耨多羅三藐三菩提我於先佛所受持讀誦此經為他人説故疾得阿耨多羅三藐三菩提得大勢彼時四衆比丘比丘尼優婆塞優婆夷以瞋恚意輕賤我故二百億劫常不值佛不聞法不見僧千劫於阿鼻地獄受大苦惱畢是罪已復遇常不輕菩薩教化阿耨多羅三藐三菩提得大勢於汝意云何爾時四衆常輕是菩薩者豈異人乎今此會中跋陀婆羅等五百菩薩師子月等五百比丘尼思佛等五百優婆塞皆於阿耨多羅三藐三菩提不退轉者是得大勢當知是法華經大饒益諸菩薩摩訶薩能令至於阿耨多羅三藐三菩提是故諸菩薩摩訶薩於如來滅後常應受持讀誦解説書寫是經爾時世尊欲重宣此義而説偈言過去有佛號威音王神智無量將導一切天人龍神所共供養是佛滅後法欲盡時有一菩薩名常不輕時諸四衆計著於法不輕菩薩往到其所而語之言我不輕汝汝等行道皆當作佛諸人聞已輕毀罵詈不輕菩薩能忍受之其罪畢已臨命終時得聞此經六根清淨神通力故增益壽命復為諸人廣説是經諸著法衆皆蒙菩薩教化成就令住佛道不輕命終值無數佛説是經故得無量福漸具功德疾成佛道彼時不輕則我身是時四部衆著法之者聞不輕言汝當作佛以是因緣值無數佛此會菩薩五百之衆并及四部清信士女今於我前聽法者是我於前世勸是諸人聽受斯經第一之法開示教人令住涅槃世世受持如是經典億億萬劫至不可議時乃得聞是法華經億億萬劫至不可議諸佛世尊時説是經是故行者於佛滅後聞如是經勿生疑惑應當一心廣説此經世世值佛疾成佛道添品妙法蓮華經如來神力品第二十爾時千世界微塵等菩薩摩訶薩從地踊出者皆於佛前一心合掌瞻仰尊顏而白佛言世尊我等於佛滅後世尊分身所在國土滅度之處當廣説此經所以者何我等亦自欲得是真淨大法受持讀誦解説書寫而供養之爾時世尊於文殊師利等無量百千萬億舊住娑婆世界菩薩摩訶薩及諸比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等一切衆前現大神力出廣長舌上至梵世一切毛孔放於無量無數色光皆悉遍照十方世界衆寶樹下師子座上諸佛亦復如是出廣長舌放無量光釋迦牟尼佛及寶樹下諸佛現神力時滿百千歲然後還攝舌相一時謦咳俱共彈指是二音聲遍至十方諸佛世界地皆六種震動其中衆生天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等以佛神力故皆見此娑婆世界無量無邊百千萬億衆寶樹下師子座上諸佛及見釋迦牟尼佛共多寶如來在寶塔中坐師子座又見無量無邊百千萬億菩薩摩訶薩及諸四衆恭敬圍繞釋迦牟尼佛既見是已皆大歡喜得未曾有即時諸天於虛空中高聲唱言過此無量無邊百千萬億阿僧祇世界有國名娑婆是中有佛名釋迦牟尼今為諸菩薩摩訶薩説大乘經名妙法蓮華教菩薩法佛所護念汝等當深心隨喜亦當禮拜供養釋迦牟尼佛彼諸衆生聞虛空中聲已合掌向娑婆世界作如是言南無釋迦牟尼佛南無釋迦牟尼佛以種種華香瓔珞幡蓋及諸嚴身之具珍寶妙物皆共遙散娑婆世界所散諸物從十方來譬如雲集變成寶帳遍覆此間諸佛之上于時十方世界通達無礙如一佛土爾時佛告上行等菩薩大衆諸佛神力如是無量無邊不可思議若我以是神力於無量無邊百千萬億阿僧祇劫為囑纍故説此經功德猶不能盡以要言之如來一切所有之法如來一切自在神力如來一切祕要之藏如來一切甚深之事皆於此經宣示顯説是故汝等於如來滅後應一心受持讀誦解説書寫如説修行所在國土若有受持讀誦解説書寫如説修行若經卷所住之處若於園中若於林中若於樹下若於僧坊若白衣舍若在殿堂若山谷曠野是中皆應起塔供養所以者何當知是處即是道場諸佛於此得阿耨多羅三藐三菩提諸佛於此轉于法輪諸佛於此而般涅槃爾時世尊欲重宣此義而説偈言諸佛救世者住於大神通為悅衆生故現無量神力舌相至梵天身放無數光為求佛道者現此希有事諸佛謦咳聲及彈指之聲周聞十方國地皆六種動以佛滅度後能持是經故諸佛皆歡喜現無量神力囑纍是經故讚美受持者於無量劫中猶故不能盡是人之功德無邊無有窮如十方虛空不可得邊際能持是經者則為已見我亦見多寶佛及諸分身者又見我今日教化諸菩薩能持是經者令我及分身滅度多寶佛一切皆歡喜十方現在佛并過去未來亦見亦供養亦令得歡喜諸佛坐道場所得祕要法能持是經者不久亦當得能持是經者於諸法之義名字及言辭樂説無窮盡如風於空中一切無障礙於如來滅後如佛所説經因緣及次第隨義如實説如日月光明能除諸幽冥斯人行世間能滅衆生暗教無量菩薩畢竟住一乘是故有智者聞此功德利於我滅度後應受持斯經是人於佛道決定無有疑妙法蓮華經陀羅尼品第二十一爾時藥王菩薩即從座起偏袒右肩合掌向佛而白佛言世尊若善男子善女人有能受持法華經者若讀誦通利若有書寫經卷得幾所福佛告藥王若有善男子善女人供養八百萬億那由他恆河沙等諸佛於汝意云何其所得福寧為多不甚多世尊佛言若善男子善女人能於是經乃至受持一四句偈讀誦解義如説修行功德甚多爾時藥王菩薩白佛言世尊我今當與説法者陀羅尼呪以守護之即説呪曰怛都割姪地夜他一安埿如帝二曼莫安埿三未泥奴羝四磨莫賀磨泥五質羝六折之熱唎七攝迷八攝寐多鼻九奢舒迦安十目訖十一目訖跢都箇簷都灆迷糝穌灆迷十二𥣯烏合鼻釤迷十三糝磨糝迷十四社時夜頤余羝十五憩欹債頤十六惡憩頤十七惡敧嬭奴皆十八奢安攝寐十九陀邏膩奴寄二十阿長聲盧迦婆拪二十一鉢囉都夜鞞剎驅察膩二十二鼻鼻𡀔二十三𥣯便扶延哆𮟩儞奴棄鼻瑟𪙔都皆二十四頞烏割顛跢波唎秫鼠出啼二十五郁於竹究犁二十六目究犁二十七頞𮟩第屠皆二十八鉢𮟩第二十九恕鼠注迦欹三十頞糝磨糝迷三十一勃地鼻盧吉三十二達磨鉢離器三十三僧伽涅瞿殺嬭三十四跋耶余哥跋夜余箇輸達泥三十五曼窒都結𠼝三十六曼怛𮟩憩夜三十七護路跢憍俱昭舍利頤三十八惡叉夜三十九惡叉跋奈奴箇多夜四十跋盧優曼禰奴夜奈多夜世尊是陀羅尼神呪六十二億恆河沙等諸佛所説若有侵毀此法師者則為侵毀是諸佛已時釋迦牟尼佛讚藥王菩薩言善哉善哉藥王汝愍念擁護此法師故説是陀羅尼於諸衆生多所饒益爾時勇施菩薩白佛言世尊我亦為擁護讀誦受持法華經者説陀羅尼若此法師得是陀羅尼若夜叉若羅剎若富單那若吉蔗若鳩槃荼若餓鬼等伺求其短無能得便即於佛前而説呪曰怛姪他一涉皤菩播犁二莫訶涉皤犁三郁雞四目雞五頞第六頞荼屠迦皤底都棄七涅唎致都寄頤八涅唎致耶跋底九一郅都筆儞十比扶必郅儞十一質郅儞十二涅唎哲都八儞十三涅唎吒都家反跋儞十四世尊是陀羅尼神呪恆河沙等諸佛所説亦皆隨喜若有侵毀此法師者則為侵毀是諸佛已爾時毗沙門天王護世者白佛言世尊我亦為愍念衆生擁護此法師故説是陀羅尼即説呪曰怛姪他一頞𪘜都皆二捺奴割𪘜三訥奴骨捺𪘜四案那廚拏句五那稚徒寄六捃俱運奈奴箇稚世尊以是神呪擁護法師我亦自當擁護持是經者令百由旬內無諸衰患爾時持國天王在此會中與千萬億那由他乾闥婆衆恭敬圍繞前詣佛所合掌白佛言世尊我亦以陀羅尼神呪擁護持法華經者即説呪曰怛姪他一惡揭其羯嬭奴皆揭嬭二瞿唎三犍伽安陀唎四旃荼徒家利五摩登祇渠棄六北羯肆七僧句犁八部𠺕薩利九世尊是陀羅尼神呪四十二億諸佛所説若有侵毀此法師者則為侵毀是諸佛已爾時有羅剎女等一名藍婆二名毗藍婆三名曲齒四名華齒五名黑齒六名多髮七名無厭足八名持瓔珞九名睪帝十名奪一切衆生精氣是十羅剎女與鬼子母并其子及眷屬俱詣佛所同聲白佛言世尊我亦欲擁護讀誦受持法華經者除其衰患若有伺求法師短者令不得便即於佛前而説呪曰怛姪他一底都棄迷此一句五遍道儞奴棄迷亦五遍護𡀔醯呼羝亦五遍道薩跢都箇醯亦五遍道寧上我頭上莫惱於法師若夜叉若羅剎若餓鬼若富單那若吉蔗若毗陀羅若乾馱若烏摩勒伽若阿跋摩羅若夜叉吉蔗若人吉蔗若熱病若一日若二日若三日若四日乃至七日若常熱病若男形若女形若童男形若童女形乃至夢中亦復莫惱即於佛前而説偈言若不順我呪惱亂説法者頭破作七分如摩利闍迦如殺父母罪亦如壓油殃斗稱欺誑人調達破僧罪犯此法師者當獲如是殃諸羅剎女説此偈已白佛言世尊我等亦當身自擁護受持讀誦修行是經者令得安隱離諸衰患消衆毒藥佛告諸羅剎女善哉善哉汝等但能擁護受持法華名者福不可量何況擁護具足受持供養經卷華香瓔珞末香塗香燒香幡蓋伎樂然種種燈穌燈油燈諸香油燈穌摩那華油燈瞻蔔華油燈婆師迦華油燈優波羅華油燈如是等百千種供養者睪諦汝等及眷屬應當擁護如是法師説此陀羅尼呪品時六萬八千人得無生法忍妙法蓮華經藥王菩薩本事品第二十二爾時宿王花菩薩白佛言世尊藥王菩薩云何遊於娑婆世界世尊是藥王菩薩有若干百千萬億那由他難行苦行善哉世尊願少解説諸天龍神夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等又他國土諸來菩薩及此聲聞衆聞皆歡喜爾時佛告宿王花菩薩乃往過去無量恆河沙劫有佛號日月淨明德如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊其佛有八十億大菩薩摩訶薩七十二恆河沙大聲聞衆佛壽四萬二千劫菩薩壽命亦等彼國無有女人地獄餓鬼畜生阿修羅等及以諸難地平如掌琉璃所成寶樹莊嚴寶帳覆上垂寶花幡寶瓶香爐周遍國界七寶為臺一樹一臺其樹去臺盡一箭道此諸寶樹皆有菩薩聲聞而坐其下諸寶臺上各有百億諸天作天伎樂歌歎於佛以為供養爾時彼佛為一切衆生喜見菩薩及衆菩薩諸聲聞衆説法華經是一切衆生喜見菩薩樂習苦行於日月淨明德佛法中精進經行一心求佛滿萬二千歲已得現一切色身三昧得此三昧已心大歡喜即作念言我得現一切色身三昧皆是得聞法華經力我今當供養日月淨明德佛及法華經即時入是三昧於虛空中雨曼陀羅華摩訶曼陀羅華細粖堅黑栴檀滿虛空中如雲而下又雨海此岸栴檀之香此香六銖價直娑婆世界以供養佛作是供養已從三昧起而自念言我雖以神力供養於佛不如以身供養即服諸香栴檀薰陸兜樓婆畢力迦沈水膠香又飲瞻蔔諸華香油滿千二百歲已香油塗身於日月淨明德佛前以天寶衣而自纏身灌諸香油以神通力願而自然身光明遍照八十億恆河沙世界其中諸佛同時讚言善哉善哉善男子是真精進是名真法供養如來若以華香瓔珞燒香粖香塗香天繒幡蓋及海此岸栴檀之香如是等種種諸物供養所不能及假使國城妻子布施亦所不及善男子是名第一之施於諸施中最尊最上以法供養諸如來故作是語已而各默然其身火然千二百歲過是已後其身乃盡一切衆生喜見菩薩作如是法供養已命終之後復生日月淨明德佛國中於淨德王家結加趺坐忽然化生即為其父而説偈言大王今當知我經行彼處即時得一切現諸身三昧勤行大精進捨所愛之身説是偈已而白父言日月淨明德佛今故現在我先供養佛已得解一切衆生語言陀羅尼復聞是法華經八百千萬億那由他甄迦羅頻婆羅阿閦婆等偈大王我今當還供養此佛白已即坐七寶之臺上升虛空高七多羅樹往到佛所頭面禮足合十指爪以偈讚佛容顏甚奇妙光明照十方我適曾供養今復還親覲爾時一切衆生喜見菩薩説是偈已而白佛言世尊世尊猶故在世爾時日月淨明德佛告一切衆生喜見菩薩善男子我涅槃時到滅盡時至汝可安施床座我於今夜當般涅槃又敕一切衆生喜見菩薩善男子我以佛法囑纍於汝及諸菩薩大弟子并阿耨多羅三藐三菩提法亦以三千大千七寶世界諸寶樹寶臺及給侍諸天悉付於汝我滅度後所有舍利亦付囑汝當令流布廣設供養應起若干千塔如是日月淨明德佛敕一切衆生喜見菩薩已於夜後分入於涅槃爾時一切衆生喜見菩薩見佛滅度悲感懊惱戀慕於佛即以海此岸栴檀為𧂐供養佛身而以燒之火滅已後收取舍利作八萬四千寶瓶以起八萬四千塔高三世界表剎莊嚴垂諸幡蓋懸衆寶鈴爾時一切衆生喜見菩薩復自念言我雖作是供養心猶未足我今當更供養舍利便語諸菩薩大弟子及天龍夜叉等一切大衆汝等當一心念我今供養日月淨明德佛舍利作是語已即於八萬四千塔前然百福莊嚴臂七萬二千歲而以供養令無數求聲聞衆無量阿僧祇人發阿耨多羅三藐三菩提心皆使得住現一切色身三昧爾時諸菩薩天人阿修羅等見其無臂憂惱悲哀而作是言此一切衆生喜見菩薩是我等師教化我者而今燒臂身不具足于時一切衆生喜見菩薩於大衆中立此誓言我捨兩臂必當得佛金色之身若實不虛令我兩臂還復如故作是誓已自然還復由斯菩薩福德智慧淳厚所致當爾之時三千大千世界六種震動天雨寶華一切人天得未曾有佛告宿王華菩薩於汝意云何一切衆生喜見菩薩豈異人乎今藥王菩薩是也其所捨身布施如是無量百千萬億那由他數宿王華若有發心欲得阿耨多羅三藐三菩提者能燃手指乃至足一指供養佛塔勝以國城妻子及三千大千國土山林河池諸珍寶物而供養者若復有人以七寶滿三千大千世界供養於佛及大菩薩辟支佛阿羅漢是人所得功德不如受持此法華經乃至一四句偈其福最多宿王華譬如一切川流江河諸水之中海為第一此法華經亦復如是於諸如來所説經中最為深大又如土山黑山小鐵圍山大鐵圍山及十寶山衆山之中須彌山為第一此法華經亦復如是於諸經中最為其上又如衆星之中月天子最為第一此法華經亦復如是於千萬億種諸經法中最為照明又如日天子能除諸暗此經亦復如是能破一切不善之暗又如諸小王中轉輪聖王最為第一此經亦復如是於衆經中最為其尊又如帝釋於三十三天中王此經亦復如是諸經中王又如大梵天王一切衆生之父此經亦復如是一切賢聖學無學及發菩薩心者之父又如一切凡夫人中須陀洹斯陀含阿那含阿羅漢辟支佛為第一此經亦復如是一切如來所説若菩薩所説若聲聞所説諸經法中最為第一有能受持是經典者亦復如是於一切衆生中亦為第一一切聲聞辟支佛中菩薩為第一此經亦復如是於一切諸經法中最為第一如佛為諸法王此經亦復如是諸經中王宿王華此經能救一切衆生者此經能令一切衆生離諸苦惱此經能大饒益一切衆生充滿其願如清涼池能滿一切諸渴乏者如寒者得火如裸者得衣如商人得主如子得母如渡得船如病得醫如暗得燈如貧得寶如民得王如賈客得海如炬除暗此法華經亦復如是能令衆生離一切苦一切病痛能解一切生死之縛若人得聞此法華經若自書若使人書所得功德以佛智慧籌量多少不得其邊若書是經卷華香瓔珞燒香粖香塗香幡蓋衣服種種之燈穌燈油燈諸香油燈瞻蔔油燈須曼那油燈波羅羅油燈婆利師迦油燈那婆摩利油燈供養所得功德亦復無量宿王華若有人聞是藥王菩薩本事品者亦得無量無邊功德若有女人聞是藥王菩薩本事品能受持者盡是女身後不復受若如來滅後後五百歲中若有女人聞是經典如説修行於此命終即往安樂世界阿彌陀佛大菩薩衆圍繞住處生蓮花中寶座之上不復為貪欲所惱亦復不為瞋恚愚癡所惱亦復不為憍慢嫉妬諸垢所惱得菩薩神通無生法忍得是忍已眼根清淨以是清淨眼根見七百萬二千億那由他恆河沙等諸佛如來是時諸佛遙共讚言善哉善哉善男子汝能於釋迦牟尼佛法中受持讀誦思惟是經為他人説所得福德無量無邊火不能焚水不能漂汝之功德千佛共説不能令盡汝今已能破諸魔賊壞生死軍諸餘怨敵皆悉摧滅善男子百千諸佛以神通力共守護汝於一切世間天人之中無如汝者唯除如來其諸聲聞辟支佛乃至菩薩智慧禪定無有與汝等者宿王華此菩薩成就如是功德智慧之力若有人聞是藥王菩薩本事品能隨喜讚善者是人現世口中常出青蓮華香身毛孔中常出牛頭栴檀之香所得功德如上所説是故宿王華以此藥王菩薩本事品囑纍於汝我滅度後後五百歲中廣宣流布於閻浮提無令斷絶惡魔魔民諸天龍夜叉鳩槃茶等得其便也宿王華汝當以神通之力守護是經所以者何此經則為閻浮提人病之良藥若人有病得聞是經病即消滅不老不死宿王華汝若見有受持是經者應以青蓮華盛滿粖香供散其上散已作是念言此人不久必當取草坐於道場破諸魔軍當吹法螺擊大法鼓度脫一切衆生老病死海是故求佛道者見有受持是經典人應當如是生恭敬心説是藥王菩薩本事品時八萬四千菩薩得解一切衆生語言陀羅尼多寶如來於寶塔中讚宿王華菩薩言善哉善哉宿王華汝成就不可思議功德乃能問釋迦牟尼佛如此之事利益無量一切衆生安爾一曼爾二摩禰三摩摩禰四旨隸五遮梨第六賒咩羊鳴音賒履罔雉切多瑋七羶輸千切帝八目帝九目多履十娑履十一阿瑋娑履十二桑履十三娑履十四叉裔十五阿叉裔十六阿耆膩十七羶帝十八賒履十九陀羅尼二十阿盧伽婆娑蘇奈切簸遮毗叉膩二十一禰毗剃二十二阿便哆都餓切邏禰履剃二十三阿亶哆波隸輸地途置切二十四漚究隸二十五牟究隸二十六阿羅隸二十七波羅隸二十八首迦差初几切二十九阿三磨三履三十佛陀毗吉利帙帝三十一達磨波利差初離切帝三十二僧伽涅瞿沙禰三十三婆舍婆舍輸地三十四曼哆邏三十五曼哆邏叉夜多三十六郵樓哆三十七郵樓哆憍舍略來加切三十八惡叉邏三十九惡叉冶多冶四十阿婆盧四十一阿摩若荏蔗切那多夜四十二痤誓螺切隸一摩訶痤隸二郁枳三目枳四阿隸五阿羅婆第六涅隸第七涅隸多婆第八伊緻豬履切抳九韋緻抳十旨緻抳十一涅隸墀抳十二涅梨墀婆底十三阿梨一那梨二䨲那梨三阿那盧四那履五拘那履六阿伽禰一伽禰二瞿利三乾陀利四旃陀利五摩蹬耆六常求利七浮樓莎抳八頞底九伊提履一伊提泯二伊提履三阿提履四伊提履五泥履六泥履七泥履八泥履九泥履十樓醯十一樓醯十二樓醯十三樓醯十四多醯十五多醯十六多醯十七兜醯十八䨲醯十九
