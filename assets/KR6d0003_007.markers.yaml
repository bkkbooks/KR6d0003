  - {type: variant, offset: 3566, length: 62, content: 爾時莊嚴幢菩薩問無盡意菩薩言：「佛子！以何因緣名觀世音？」無盡意菩薩即便遍觀觀世音菩薩過去願海，告莊嚴幢菩薩言：「佛子！諦聽觀世音菩薩所行之行。」, 宋: '', 元: '', 明: ''}
