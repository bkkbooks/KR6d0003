body:
  text: 添品妙法蓮華經序隋仁壽元年崛多笈多二法師添品妙法蓮華經者破二明一之指歸也降神五濁弘道三乘權智不思大悲難極先設化城之迹後示繫珠之本車雖有異雨實無差記以正覺之名許以真子之位同入法性歸之於此昔燉煌沙門竺法護於晉武之世譯正法華後秦姚興更請羅什譯妙法蓮華考驗二譯定非一本護似多羅之葉什似龜茲之文余撿經藏備見二本多羅則與正法符會龜茲則共妙法允同護葉尚有所遺什文寧無其漏而護所闕者普門品偈也什所闕者藥草喻品之半富樓那及法師等二品之初提婆達多品普門品偈也什又移囑纍在藥王之前二本陀羅尼並置普門之後其間異同言不能極竊見提婆達多及普門品偈先賢續出補闕流行余景仰遺風憲章成範大隋仁壽元年辛酉之歲因普曜寺沙門上行所請遂共三藏崛多笈多二法師於大興善寺重勘天竺多羅葉本富樓那及法師等二品之初勘本猶闕藥草喻品更益其半提婆達多通入塔品陀羅尼次神力之後囑纍還結其終字句差殊頗亦改正儻有披尋幸勿疑惑雖千萬億偈妙義難盡而二十七品本文且具所願四辨梵詞遍神州之域一乘祕教悟象運之機聊記翻譯序之云爾
