body:
  text: 隋天竺三藏闍那崛多共笈多譯妙法蓮華經序品第一如是我聞一時佛住王舍城耆闍崛山中與大比丘衆萬二千人俱皆是阿羅漢諸漏已盡無復煩惱逮得己利盡諸有結心得自在其名曰阿若憍陳如摩訶迦葉優樓頻螺迦葉伽耶迦葉那提迦葉舍利弗大目乾連摩訶迦旃延阿㝹樓馱劫賓那憍梵波提離婆多畢陵伽婆蹉薄拘羅摩訶拘絺羅難陀孫陀羅難陀富樓那彌多羅尼子須菩提阿難羅睺羅如是衆所知識大阿羅漢等復有學無學二千人摩訶波闍波提比丘尼與眷屬六千人俱羅睺羅母耶輸陀羅比丘尼亦與眷屬俱菩薩摩訶薩八萬人皆於阿耨多羅三藐三菩提不退轉皆得陀羅尼樂說辨才轉不退轉法輪供養無量百千諸佛於諸佛所殖衆德本常為諸佛之所稱歎以慈修身善入佛慧通達大智到於彼岸名稱普聞無量世界能度無數百千衆生其名曰文殊師利菩薩觀世音菩薩得大勢菩薩常精進菩薩不休息菩薩寶掌菩薩藥王菩薩勇施菩薩寶月菩薩月光菩薩滿月菩薩大力菩薩無量力菩薩越三界菩薩跋陀婆羅菩薩彌勒菩薩寶積菩薩導師菩薩如是等菩薩摩訶薩八萬人俱爾時釋提桓因與其眷屬二萬天子俱復有名月天子普香天子寶光天子四大天王與其眷屬萬天子俱自在天子大自在天子與其眷屬三萬天子俱娑婆世界主梵天王尸棄大梵光明大梵等與其眷屬萬二千天子俱有八龍王難陀龍王跋難陀龍王娑伽羅龍王和修吉龍王德叉迦龍王阿那婆達多龍王摩那斯龍王漚鉢羅龍王等各與若干百千眷屬俱有四緊那羅王法緊那羅王妙法緊那羅王大法緊那羅王持法緊那羅王各與若干百千眷屬俱有四乾闥婆王樂乾闥婆王樂音乾闥婆王美乾闥婆王美音乾闥婆王各與若干百千眷屬俱有四阿修羅王婆稚阿修羅王佉羅騫馱阿修羅王毗摩質多羅阿修羅王羅睺阿修羅王各與若干百千眷屬俱有四迦樓羅王大威德迦樓羅王大身迦樓羅王大滿迦樓羅王如意迦樓羅王各與若干百千眷屬俱韋提希子阿闍世王與若干百千眷屬俱各禮佛足退坐一面爾時世尊四衆圍繞供養恭敬尊重讚歎為諸菩薩說大乘經名無量義教菩薩法佛所護念佛說此經已結加趺坐入於無量義處三昧身心不動是時天雨曼陀羅華摩訶曼陀羅華曼殊沙華摩訶曼殊沙華而散佛上及諸大衆普佛世界六種振動爾時會中比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等及諸小王轉輪聖王是諸大衆得未曾有歡喜合掌一心觀佛爾時佛放眉間白毫相光照東方萬八千世界靡不周遍下至阿鼻地獄上至阿迦膩吒天於此世界盡見彼土六趣衆生又見彼土現在諸佛及聞諸佛所說經法并見彼諸比丘比丘尼優婆塞優婆夷諸修行得道者復見諸菩薩摩訶薩種種因緣種種信解種種相貌行菩薩道復見諸佛般涅槃者復見諸佛般涅槃後以佛舍利起七寶塔爾時彌勒菩薩作是念今者世尊現神變相以何因緣而有此瑞今佛世尊入于三昧是不可思議現希有事當以問誰誰能答者復作此念是文殊師利法王之子已曾親近供養過去無量諸佛必應見此希有之相我今當問爾時比丘比丘尼優婆塞優婆夷及諸天龍鬼神等咸作此念是佛光明神通之相今當問誰爾時彌勒菩薩欲自決疑又觀四衆比丘比丘尼優婆塞優婆夷及諸天龍鬼神等衆會之心而問文殊師利言以何因緣而有此瑞神通之相放大光明照於東方萬八千土悉見彼佛國界莊嚴於是彌勒菩薩欲重宣此義以偈問曰文殊師利導師何故眉間白毫大光普照雨曼陀羅曼殊沙華栴檀香風悅可衆心以是因緣地皆嚴淨而此世界六種震動時四部衆咸皆歡喜身意快然得未曾有眉間光明照于東方萬八千土皆如金色從阿鼻獄上至有頂諸世界中六道衆生生死所趣善惡業緣受報好醜於此悉見又覩諸佛聖主師子演說經典微妙第一其聲清淨出柔軟音教諸菩薩無數億萬梵音深妙令人樂聞各於世界講說正法種種因緣以無量喻照明佛法開悟衆生若人遭苦厭老病死為說涅槃盡諸苦際若人有福曾供養佛志求勝法為說緣覺若有佛子修種種行求無上慧為說淨道文殊師利我住於此見聞若斯及千億事如是衆多今當略說我見彼土恆沙菩薩種種因緣而求佛道或有行施金銀珊瑚真珠摩尼車𤦲馬瑙金剛諸珍奴婢車乘寶飾輦輿歡喜布施回向佛道願得是乘三界第一諸佛所歎或有菩薩駟馬寶車欄楯華蓋軒飾布施復見菩薩身肉手足及妻子施求無上道又見菩薩頭目身體欣樂施與求佛智慧文殊師利我見諸王往詣佛所問無上道便捨樂土宮殿臣妾剃除鬚髮而被法服或見菩薩而作比丘獨處間靜樂誦經典又見菩薩勇猛精進入於深山思惟佛道又見離欲常處空間深修禪定得五神通又見菩薩安禪合掌以千萬偈讚諸法王復見菩薩智深志固能問諸佛聞悉受持又見佛子定慧具足以無量喻為衆講法欣樂說法化諸菩薩破魔兵衆而擊法鼓又見菩薩寂然宴默天龍恭敬不以為喜又見菩薩處林放光濟地獄苦令入佛道又見佛子未嘗睡眠經行林中勤求佛道又見具戒威儀無缺淨如寶珠以求佛道又見佛子住忍辱力增上慢人惡罵捶打皆悉能忍以求佛道又見菩薩離諸戲笑及癡眷屬親近智者一心除亂攝念山林億千萬歲以求佛道或見菩薩肴膳飲食百種湯藥施佛及僧名衣上服價直千萬或無價衣施佛及僧千萬億種栴檀寶舍衆妙臥具施佛及僧清淨園林華果茂盛流泉浴池施佛及僧如是等施種種微妙歡喜無厭求無上道或有菩薩說寂滅法種種教詔無數衆生又見菩薩觀諸法性無有一相猶如虛空又見佛子心無所著以此妙慧求無上道文殊師利又有菩薩佛滅度後供養舍利又見佛子造諸塔廟無數恆沙嚴飾國界寶塔高妙五千由旬縱廣正等二千由旬一一塔廟各千幢幡珠交露縵寶鈴和鳴諸天龍神人及非人香華伎樂常以供養文殊師利諸佛子等為供舍利嚴飾塔廟國界自然殊特妙好如天樹王其華開敷佛放一光我及衆會見此國界種種殊妙諸佛神力智慧希有放一淨光照無量國我等見此得未曾有佛子文殊願決衆疑四衆欣仰瞻仁及我世尊何故放斯光明佛子時答決疑令喜何所饒益演斯光明佛坐道場所得妙法為欲說此為當授記示諸佛土衆寶嚴淨及見諸佛此非小緣文殊當知四衆龍神瞻察仁者為說何等是時文殊師利語彌勒菩薩摩訶薩及諸大士善男子等如我惟忖今佛世尊欲說大法雨大法雨吹大法螺擊大法鼓演大法義諸善男子我於過去諸佛曾見此瑞放斯光已即說大法是故當知今佛現光亦復如是欲令衆生咸得聞知一切世間難信之法故現斯瑞諸善男子如過去無量無邊不可思議阿僧祇劫爾時有佛號日月燈明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊演說正法初善中善後善其義深遠其語巧妙純一無雜具足清白梵行之相為求聲聞者說應四諦法度生老病死究竟涅槃為求辟支佛者說應十二因緣法為諸菩薩說應六波羅蜜令得阿耨多羅三藐三菩提成一切種智次復有佛亦名日月燈明次復有佛亦名日月燈明如是二萬佛皆同一字號日月燈明又同一姓姓頗羅墮彌勒當知初佛後佛皆同一字名日月燈明十號具足所可說法初中後善其最後佛未出家時有八王子一名有意二名善意三名無量意四名寶意五名增意六名除疑意七名響意八名法意是八王子威德自在各領四天下是諸王子聞父出家得阿耨多羅三藐三菩提悉捨王位亦隨出家發大乘意常修梵行皆為法師已於千萬佛所殖諸善本是時日月燈明佛說大乘經名無量義教菩薩法佛所護念說是經已即於大衆中結加趺坐入於無量義處三昧身心不動是時天雨曼陀羅華摩訶曼陀羅華曼殊沙華摩訶曼殊沙華而散佛上及諸大衆普佛世界六種震動爾時會中比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等及諸小王轉輪聖王等是諸大衆得未曾有歡喜合掌一心觀佛爾時如來放眉間白毫相光照東方萬八千佛土靡不周遍如今所見是諸佛土彌勒當知爾時會中有二十億菩薩樂欲聽法是諸菩薩見此光明普照佛土得未曾有欲知此光所為因緣時有菩薩名曰妙光有八百弟子是時日月燈明佛從三昧起因妙光菩薩說大乘經名妙法蓮華教菩薩法佛所護念六十小劫不起于座時會聽者亦坐一處六十小劫身心不動聽佛所說謂如食頃是時衆中無有一人若身若心而生懈倦日月燈明佛於六十小劫說是經已即於梵魔沙門婆羅門及天人阿修羅衆中而宣此言如來於今日中夜當入無餘涅槃時有菩薩名曰德藏日月燈明佛即授其記告諸比丘是德藏菩薩次當作佛號曰淨身多陀阿伽度阿羅訶三藐三佛陀佛授記已便於中夜入無餘涅槃佛滅度後妙光菩薩持妙法蓮華經滿八十小劫為人演說日月燈明佛八子皆師妙光妙光教化令其堅固阿耨多羅三藐三菩提是諸王子供養無量百千萬億佛已皆成佛道其最後成佛者名曰然燈八百弟子中有一人號曰求名貪著利養雖復讀誦衆經而不通利多所忘失故號求名是人亦以種諸善根因緣故得值無量百千萬億諸佛供養恭敬尊重讚歎彌勒當知爾時妙光菩薩豈異人乎我身是也求名菩薩汝身是也今見此瑞與本無異是故惟忖今日如來當說大乘經名妙法蓮華教菩薩法佛所護念爾時文殊師利於大衆中欲重宣此義而說偈言我念過去世無量無數劫有佛人中尊號日月燈明世尊演說法度無量衆生無數億菩薩令入佛智慧佛未出家時所生八王子見大聖出家亦隨修梵行時佛說大乘經名無量義於諸大衆中而為廣分別佛說此經已即於法座上加趺坐三昧名無量義處天雨曼陀華天鼓自然鳴諸天龍鬼神供養人中尊一切諸佛土即時大震動佛放眉間光現諸希有事此光照東方萬八千佛土示一切衆生生死業報處又見諸佛土以衆寶莊嚴琉璃頗梨色斯由佛光照及見諸天人龍神夜叉衆乾闥緊那羅各供養其佛又見諸如來自然成佛道身色如金山端嚴甚微妙如淨琉璃中內現真金像世尊在大衆敷演深法義一一諸佛土聲聞衆無數因佛光所照悉見彼大衆或有諸比丘在於山林中精進持淨戒猶如護明珠又見諸菩薩行施忍辱等其數如恆沙斯由佛光照又見諸菩薩深入諸禪定身心寂不動以求無上道又見諸菩薩知法寂滅相各於其國土說法求佛道爾時四部衆見日月燈佛現大神通力其心皆歡喜各各自相問是事何因緣天人所奉尊適從三昧起讚妙光菩薩汝為世間眼一切所歸信能奉持法藏如我所說法惟汝能證知世尊既讚歎令妙光歡喜說是法華經滿六十小劫不起於此座所說上妙法是妙光法師悉皆能受持佛說是法華令衆歡喜已尋即於是日告於天人衆諸法實相義已為汝等說我今於中夜當入於涅槃汝一心精進當離於放逸諸佛甚難值億劫時一遇世尊諸子等聞佛入涅槃各各懷悲惱佛滅一何速聖主法之王安慰無量衆我若滅度時汝等勿憂怖是德藏菩薩於無漏實相心已得通達其次當作佛號曰為淨身亦度無量衆佛此夜滅度如薪盡火滅分布諸舍利而起無量塔比丘比丘尼其數如恆沙倍復加精進以求無上道是妙光法師奉持佛法藏八十小劫中廣宣法華經是諸八王子妙光所開化堅固無上道當見無數佛供養諸佛已隨順行大道相繼得成佛轉次而授記最後天中天號曰然燈佛諸仙之導師度脫無量衆是妙光法師時有一弟子心常懷懈怠貪著於名利求名利無厭多遊族姓家棄捨所習誦廢忘不通利以是因緣故號之為求名亦行衆善業得見無數佛供養於諸佛隨順行大道具六波羅蜜今見釋師子其後當作佛號名曰彌勒廣度諸衆生其數無有量彼佛滅度後懈怠者汝是妙光法師者今則我身是我見燈明佛本光瑞如此以是知今佛欲說法華經今相如本瑞是諸佛方便今佛放光明助發實相義諸人今當知合掌一心待佛當雨法雨充足求道者諸求三乘人若有疑悔者佛當為除斷令盡無有餘妙法蓮華經方便品第二爾時世尊從三昧安詳而起告舍利弗諸佛智慧甚深無量其智慧門難解難入一切聲聞辟支佛所不能知所以者何佛曾親近百千萬億無數諸佛盡行諸佛無量道法勇猛精進名稱普聞成就甚深未曾有法隨宜所說意趣難解舍利弗吾從成佛已來種種因緣種種譬喻廣演言教無數方便引導衆生令離諸著所以者何如來方便知見波羅蜜皆已具足舍利弗如來知見廣大深遠無量無礙力無所畏禪定解脫三昧深入無際成就一切未曾有法舍利弗如來能種種分別巧說諸法言辭柔軟悅可衆心舍利弗取要言之無量無邊未曾有法佛悉成就止舍利弗不須復說所以者何佛所成就第一希有難解之法惟佛與佛乃能究盡諸法實相所謂諸法如是相如是性如是體如是力如是作如是因如是緣如是果如是報如是本末究竟等爾時世尊欲重宣此義而說偈言世雄不可量諸天及世人一切衆生類無能知佛者佛力無所畏解脫諸三昧及佛諸餘法無能測量者本從無數佛具足行諸道甚深微妙法難見難可了於無量億劫行此諸道已道場得成果我已悉知見如是大果報種種性相義我及十方佛乃能知是事是法不可示言辭相寂滅諸餘衆生類無有能得解除諸菩薩衆信力堅固者諸佛弟子衆曾供養諸佛一切漏已盡住是最後身如是諸人等其力所不堪假使滿世間皆如舍利弗盡思共度量不能測佛智正使滿十方皆如舍利弗及餘諸弟子亦滿十方剎盡思共度量亦復不能知辟支佛利智無漏最後身亦滿十方界其數如竹林斯等共一心於億無量劫欲思佛實智莫能知少分新發意菩薩供養無數佛了達諸義趣又能善說法如稻麻竹𥯤充滿十方剎一心以妙智於恆河沙劫咸皆共思量不能知佛智不退諸菩薩其數如恆沙一心共思求亦復不能知又告舍利弗無漏不思議甚深微妙法我今已具得惟我知是相十方佛亦然舍利弗當知諸佛語無異於佛所說法當生大信力世尊法久後要當說真實告諸聲聞衆及求緣覺乘我令脫苦縛逮得涅槃者佛以方便力示以三乘教衆生處處著引之令得出爾時大衆中有諸聲聞漏盡阿羅漢阿若憍陳如等千二百人及發聲聞辟支佛心比丘比丘尼優婆塞優婆夷各作是念今者世尊何故殷勤稱歎方便而作是言佛所得法甚深難解有所言說意趣難知一切聲聞辟支佛所不能及佛說一解脫義我等亦得此法到於涅槃而今不知是義所趣爾時舍利弗知四衆心疑自亦未了而白佛言世尊何因何緣殷勤稱歎諸佛第一方便甚深微妙難解之法我自昔來未曾從佛聞如是說今者四衆咸皆有疑惟願世尊敷演斯事世尊何故殷勤稱歎甚深微妙難解之法爾時舍利弗欲重宣此義而說偈言慧日大聖尊久乃說是法自說得如是力無畏三昧禪定解脫等不可思議法道場所得法無能發問者我意難可測亦無能問者無問而自說稱歎所行道智慧甚微妙諸佛之所得無漏諸羅漢及求涅槃者今皆墮疑網佛何故說是其求緣覺者比丘比丘尼諸天龍鬼神及乾闥婆等相視懷猶豫瞻仰兩足尊是事為云何願佛為解說於諸聲聞衆佛說我第一我今自於智疑惑不能了為是究竟法為是所行道佛口所生子合掌瞻仰待願出微妙音時為如實說諸天龍神等其數如恆沙求佛諸菩薩大數有八萬又諸萬億國轉輪聖王至合掌以敬心欲聞具足道爾時佛告舍利弗止止不須復說若說是事一切世間諸天及人皆當驚疑舍利弗重白佛言世尊惟願說之惟願說之所以者何是會無數百千萬億阿僧祇衆生曾見諸佛諸根猛利智慧明了聞佛所說則能敬信爾時舍利弗欲重宣此義而說偈言法王無上尊惟說願勿慮是會無量衆有能敬信者佛復止舍利弗若說是事一切世間天人阿修羅皆當驚疑增上慢比丘將墜於大坑爾時世尊重說偈言止止不須說我法妙難思諸增上慢者聞必不敬信爾時舍利弗重白佛言世尊惟願說之惟願說之今此會中如我等比百千萬億世世已曾從佛受化如此人等必能敬信長夜安隱多所饒益爾時舍利弗欲重宣此義而說偈言無上兩足尊願說第一法我為佛長子惟垂分別說是會無量衆能敬信此法佛已曾世世教化如是等皆一心合掌欲聽受佛語我等千二百及餘求佛者願為此衆故惟垂分別說是等聞此法則生大歡喜爾時世尊告舍利弗汝已殷勤三請豈得不說汝今諦聽善思念之吾當為汝分別解說說此語時會中有比丘比丘尼優婆塞優婆夷五千人等即從座起禮佛而退所以者何此輩罪根深重及增上慢未得謂得未證謂證有如此失是以不住世尊默然而不制止爾時佛告舍利弗我今此衆無復枝葉純有貞實舍利弗如是增上慢人退亦佳矣汝今善聽當為汝說舍利弗言唯然世尊願樂欲聞佛告舍利弗如是妙法諸佛如來時乃說之如優曇鉢華時一現耳舍利弗汝等當信佛之所說言不虛妄舍利弗諸佛隨宜說法意趣難解所以者何我以無數方便種種因緣譬喻言辭演說諸法是法非思量分別之所能解惟有諸佛乃能知之所以者何諸佛世尊惟以一大事因緣故出現於世舍利弗云何名諸佛世尊惟以一大事因緣故出現於世諸佛世尊欲令衆生開佛知見使得清淨故出現於世欲示衆生佛知見故出現於世欲令衆生悟佛知見故出現於世欲令衆生入佛知見道故出現於世舍利弗是為諸佛以一大事因緣故出現於世佛告舍利弗諸佛如來但教化菩薩諸有所作常為一事惟以佛之知見示悟衆生舍利弗如來但以一佛乘故為衆生說法無有餘乘若二若三舍利弗一切十方諸佛法亦如是舍利弗過去諸佛以無量無數方便種種因緣譬喻言辭而為衆生演說諸法是法皆為一佛乘故是諸衆生從諸佛聞法究竟皆得一切種智舍利弗未來諸佛當出於世亦以無量無數方便種種因緣譬喻言辭而為衆生演說諸法是法皆為一佛乘故是諸衆生從佛聞法究竟皆得一切種智舍利弗現在十方無量百千萬億佛土中諸佛世尊多所饒益安樂衆生是諸佛亦以無量無數方便種種因緣譬喻言辭而為衆生演說諸法是法皆為一佛乘故是諸衆生從佛聞法究竟皆得一切種智舍利弗是諸佛但教化菩薩欲以佛之知見示衆生故欲以佛之知見悟衆生故欲令衆生入佛知見道故舍利弗我今亦復如是知諸衆生有種種欲深心所著隨其本性以種種因緣譬喻言辭方便力故而為說法舍利弗如此皆為得一佛乘一切種智故舍利弗十方世界中尚無二乘何況有三舍利弗諸佛出於五濁惡世所謂劫濁煩惱濁衆生濁見濁命濁如是舍利弗劫濁亂時衆生垢重慳貪嫉妬成就諸不善根故諸佛以方便力於一佛乘分別說三舍利弗若我弟子自謂阿羅漢辟支佛者不聞不知諸佛如來但教化菩薩事此非佛弟子非阿羅漢非辟支佛又舍利弗是諸比丘比丘尼自謂已得阿羅漢是最後身究竟涅槃便不復志求阿耨多羅三藐三菩提當知此輩皆是增上慢人所以者何若有比丘實得阿羅漢若不信此法無有是處除佛滅度後現前無佛所以者何佛滅度後如是等經受持讀誦解其義者是人難得若遇餘佛於此法中便得決了舍利弗汝等當一心信解受持佛語諸佛如來言無虛妄無有餘乘惟一佛乘爾時世尊欲重宣此義而說偈言比丘比丘尼有懷增上慢優婆塞我慢優婆夷不信如是四衆等其數有五千不自見其過於戒有缺漏護惜其瑕疵是小智已出衆中之糟糠佛威德故去斯人鮮福德不堪受是法此衆無枝葉惟有諸貞實舍利弗善聽諸佛所得法無量方便力而為衆生說衆生心所念種種所行道若干諸欲性先世善惡業佛悉知是已以諸緣譬喻言辭方便力令一切歡喜或說修多羅伽陀及本事本生未曾有亦說於因緣譬喻并祇夜優波提舍經鈍根樂小法貪著於生死於諸無量佛不行深妙道衆苦所惱亂為是說涅槃我設是方便令得入佛慧未曾說汝等當得成佛道所以未曾說說時未至故今正是其時決定說大乘我此九部法隨順衆生說入大乘為本以故說是經有佛子心淨柔軟亦利根無量諸佛所而行深妙道為此諸佛子說是大乘經我記如是人來世成佛道以深心念佛修持淨戒故此等聞得佛大喜充遍身佛知彼心行故為說大乘聲聞若菩薩聞我所說法乃至於一偈皆成佛無疑十方佛土中惟有一乘法無二亦無三除佛方便說但以假名字引導於衆生說佛智慧故諸佛出於世惟此一事實餘二則非真終不以小乘濟度於衆生佛自住大乘如其所得法定慧力莊嚴以此度衆生自證無上道大乘平等法若以小乘化乃至於一人我則墮慳貪此事為不可若人信歸佛如來不欺誑亦無貪嫉意斷諸法中惡故佛於十方而獨無所畏我以相嚴身光明照世間無量衆所尊為說實相印舍利弗當知我本立誓願欲令一切衆如我等無異如我昔所願今者已滿足化一切衆生皆令入佛道若我遇衆生盡教以佛道無智者錯亂迷惑不受教我知此衆生未曾修善本堅著於五欲癡愛故生惱以諸欲因緣墜墮三惡道輪回六趣中備受諸苦毒受胎之微形世世常增長薄德少福人衆苦所逼迫入邪見稠林若有若無等依止此諸見具足六十二深著虛妄法堅受不可捨我慢自矜高諂曲心不實於千萬億劫不聞佛名字亦不聞正法如是人難度是故舍利弗我為設方便說諸盡苦道示之以涅槃我雖說涅槃是亦非真滅諸法從本來常自寂滅相佛子行道已來世得作佛我有方便力開示三乘法一切諸世尊皆說一乘道今此諸大衆皆應除疑惑諸佛語無異惟一無二乘過去無數劫無量滅度佛百千萬億種其數不可量如是諸世尊種種緣譬喻無數方便力演說諸法相是諸世尊等皆說一乘法化無量衆生令入於佛道又諸大聖主知一切世間天人群生類深心之所欲更以異方便助顯第一義若有衆生類值諸過去佛若聞法布施或持戒忍辱精進禪智等種種修福慧如是諸人等皆已成佛道諸佛滅度已若人善軟心如是諸衆生皆已成佛道諸佛滅度已供養舍利者起萬億種塔金銀及頗梨車𤦲與馬瑙玫瑰琉璃珠清淨廣嚴飾莊校於諸塔或有起石廟栴檀及沈水木櫁并餘材磚瓦泥土等若於曠野中積土成佛廟乃至童子戲聚沙為佛塔如是諸人等皆已成佛道若人為佛故建立諸形像刻雕成衆相皆已成佛道或以七寶成鍮石赤白銅白鑞及鉛錫鐵木及與泥或以膠漆布嚴飾作佛像如是諸人等皆已成佛道彩畫作佛像百福莊嚴相自作若使人皆已成佛道乃至童子戲若草木及筆或以指爪甲而畫作佛像如是諸人等漸漸積功德具足大悲心皆已成佛道但化諸菩薩度脫無量衆若人於塔廟寶像及畫像以華香幡蓋敬心而供養若使人作樂擊鼓吹角貝簫笛琴箜篌琵琶鐃銅鈸如是衆妙音盡持以供養或以歡喜心歌唄頌佛德乃至一小音皆已成佛道若人散亂心乃至以一華供養於畫像漸見無數佛或有人禮拜或復但合掌乃至舉一手或復小低頭以此供養像漸見無量佛自成無上道廣度無數衆入無餘涅槃如薪盡火滅若人散亂心入於塔廟中一稱南無佛皆已成佛道於諸過去佛現在或滅度若有聞是法皆已成佛道未來諸世尊其數無有量是諸如來等亦方便說法一切諸如來以無量方便度脫諸衆生入佛無漏智若有聞法者無一不成佛諸佛本誓願我所行佛道普欲令衆生亦同得此道未來世諸佛雖說百千億無數諸法門其實為一乘諸佛兩足尊知法常無性佛種從緣起是故說一乘是法住法位世間相常住於道場知已道師方便說天人所供養現在十方佛其數如恆沙出現於世間安隱衆生故亦說如是法知第一寂滅以方便力故雖示種種道其實為佛乘知衆生諸行深心之所念過去所集業欲性精進力及諸根利鈍以種種因緣譬喻亦言辭隨應方便說我今亦如是安隱衆生故以種種法門宣示於佛道我以智慧力知衆生性欲方便說諸法皆令得歡喜舍利弗當知我以佛眼觀見六道衆生貧窮無福慧入生死險道相續苦不斷深著於五欲如犛牛愛尾以貪愛自蔽盲冥無所見不求大勢佛及與斷苦法深入諸邪見以苦欲捨苦為是衆生故而起大悲心我始坐道場觀樹亦經行於三七日中思惟如是事我所得智慧微妙最第一衆生諸根鈍著樂癡所盲如斯之等類云何而可度爾時諸梵王及諸天帝釋護世四天王及大自在天并餘諸天衆眷屬百千萬恭敬合掌禮請我轉法輪我即自思惟若但讚佛乘衆生沒在苦不能信是法破法不信故墜於三惡道我寧不說法疾入於涅槃尋念過去佛所行方便力我今所得道亦應說三乘作是思惟時十方佛皆現梵音慰喻我善哉釋迦文第一之導師得是無上法隨諸一切佛而用方便力我等亦皆得最妙第一法為諸衆生類分別說三乘少智樂小法不自信作佛是故以方便分別說諸果雖復說三乘但為教菩薩舍利弗當知我聞聖師子深淨微妙音稱南無諸佛復作如是念我出濁惡世如諸佛所說我亦隨順行思惟是事已即趣波羅奈諸法寂滅相不可以言宣以方便力故為五比丘說是名轉法輪便有涅槃音及以阿羅漢法僧差別名從久遠劫來讚示涅槃法生死苦永盡我常如是說舍利弗當知我見佛子等志求佛道者無量千萬億咸以恭敬心皆來至佛所曾從諸佛聞方便所說法我即作是念如來所以出為說佛慧故今正是其時舍利弗當知鈍根小智人著相憍慢者不能信是法今我喜無畏於諸菩薩中正直捨方便但說無上道菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛如三世諸佛說法之儀式我今亦如是說無分別法諸佛興出世懸遠值遇難正使出于世說是法復難無量無數劫聞是法亦難能聽是法者斯人亦復難譬如優曇華一切皆愛樂天人所希有時時乃一出聞法歡喜讚乃至發一言則為已供養一切三世佛是人甚希有過於優曇華汝等勿有疑我為諸法王普告諸大衆但以一乘道教化諸菩薩無聲聞弟子汝等舍利弗聲聞及菩薩當知是妙法諸佛之祕要以五濁惡世但樂著諸欲如是等衆生終不求佛道當來世惡人聞佛說一乘迷惑不信受破法墮惡道有慚愧清淨志求佛道者當為如是等廣讚一乘道舍利弗當知諸佛法如是以萬億方便隨宜而說法其不習學者不能曉了此汝等既已知諸佛世之師隨宜方便事無復諸疑惑心生大歡喜自知當作佛
