  - {type: variant, offset: 8051, length: 65, content: 說是語時，十方無量分身諸佛坐寶樹下師子座上者，及多寶佛，并上行等無邊阿僧祇菩薩大眾，舍利弗等聲聞四眾，及一切世間天人阿修羅等，聞佛所說皆大歡喜, 宋: 佛說是經時普賢等諸菩薩舍利弗等諸聲聞及諸天龍人非人等一切大會皆大歡喜受持佛語作禮而去, 元: 佛說是經時普賢等諸菩薩舍利弗等諸聲聞及諸天龍人非人等一切大會皆大歡喜受持佛語作禮而去, 明: 佛說是經時普賢等諸菩薩舍利弗等諸聲聞及諸天龍人非人等一切大會皆大歡喜受持佛語作禮而去}
